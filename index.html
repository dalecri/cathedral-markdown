<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Organic Cathedral</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    textarea { resize: none; }
    /* Hide scrollbar for cleaner UI */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // --- ICONS (Inline SVGs to replace lucide-react) ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Settings2 = (p) => <Icon {...p}><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path><path d="M6 12V4"></path><circle cx="12" cy="8" r="2"></circle><circle cx="18" cy="16" r="2"></circle><circle cx="6" cy="14" r="2"></circle></Icon>;
    const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
    const Maximize2 = (p) => <Icon {...p}><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></Icon>;
    const Moon = (p) => <Icon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></Icon>;
    const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></Icon>;
    const CloudRain = (p) => <Icon {...p}><path d="M16 13v8"></path><path d="M8 13v8"></path><path d="M12 15v8"></path><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path></Icon>;
    const Snowflake = (p) => <Icon {...p}><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line><path d="m20 16-4-4 4-4"></path><path d="m4 8 4 4-4 4"></path><path d="m16 4-4 4-4-4"></path><path d="m8 20 4-4 4 4"></path></Icon>;
    const Pen = (p) => <Icon {...p}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></Icon>;

    // --- CONSTANTS & ARCHITECTURAL FOOTPRINT ---
    const PALETTES = {
      dusk: {
        name: 'Dusk', icon: Moon,
        stone: '#d8cdb8', stoneDark: '#a89880', stoneLight: '#ece0c8',
        floor: '#8a7a60', roof: '#6b4a3a', roofDark: '#4a3025',
        pillar: '#c4b295', spire: '#4a5a7a', spireCap: '#3a4a65',
        gold: '#e8b560', teal: '#4a9a8a', plum: '#a05a7a', moss: '#6b8a5a',
        glass1: '#c06090', glass2: '#60a0c0', glass3: '#e8b560',
        ground: '#3a4050', sky1: '#2a2a40', sky2: '#6a4560', sky3: '#d89a70',
      },
      dawn: {
        name: 'Dawn', icon: Sun,
        stone: '#e8dcc0', stoneDark: '#b8a488', stoneLight: '#f4ead4',
        floor: '#967a5a', roof: '#8a5a48', roofDark: '#5a3028',
        pillar: '#d8c4a4', spire: '#7a8ab0', spireCap: '#5a6a95',
        gold: '#f0c878', teal: '#5aaa9a', plum: '#b86a8a', moss: '#7a9a6a',
        glass1: '#d07090', glass2: '#70b0d0', glass3: '#f0d088',
        ground: '#4a5060', sky1: '#f0c090', sky2: '#e8a0a0', sky3: '#b090c0',
      },
      night: {
        name: 'Night', icon: CloudRain,
        stone: '#5a5a70', stoneDark: '#3a3a50', stoneLight: '#6a6a85',
        floor: '#2a2a40', roof: '#202035', roofDark: '#12121f',
        pillar: '#4a4a65', spire: '#2a3055', spireCap: '#1a2040',
        gold: '#ffd070', teal: '#50c0b0', plum: '#c060a0', moss: '#5a8a6a',
        glass1: '#d040a0', glass2: '#40b0d0', glass3: '#ffc060',
        ground: '#1a1a2a', sky1: '#0a0a1a', sky2: '#1a1a35', sky3: '#2a2050',
      },
      snow: {
        name: 'Snow', icon: Snowflake,
        stone: '#e8e8ec', stoneDark: '#b8b8c0', stoneLight: '#f4f4f8',
        floor: '#9898a0', roof: '#6878a0', roofDark: '#404a6a',
        pillar: '#d8d8e0', spire: '#5868a0', spireCap: '#3a4a78',
        gold: '#e8c070', teal: '#70b8c8', plum: '#a878b0', moss: '#7a9aa0',
        glass1: '#b060a0', glass2: '#60a0c8', glass3: '#e8b870',
        ground: '#c8ccd8', sky1: '#c8d0e0', sky2: '#d8d8e8', sky3: '#e8e0e0',
      },
    };

    const NAVE_W = 10, NAVE_E = 8, NAVE_HALF = 3, AISLE = 1;
    const TR_HALF = 5, TR_W = 3, APSE_END = NAVE_E + 3;
    const WEST_TOWER_N = { x: -NAVE_W, z: -3 }, WEST_TOWER_S = { x: -NAVE_W, z: 3 };
    const NW_TURRET = { x: -NAVE_W - 1, z: -3 };

    function inFoot(x, z) {
      if (x >= -NAVE_W && x <= NAVE_E && z >= -(NAVE_HALF + AISLE) && z <= (NAVE_HALF + AISLE)) return true;
      if (z >= -TR_HALF && z <= TR_HALF && x >= -TR_W && x <= TR_W) return true;
      if (x > NAVE_E && x <= APSE_END) {
        const dx = x - NAVE_E;
        const maxZ = Math.round(Math.sqrt(Math.max(0, 9 - dx * dx)));
        if (z >= -maxZ && z <= maxZ) return true;
      }
      if (x >= -NAVE_W - 1 && x <= -NAVE_W + 1) {
        if (z >= -4 && z <= -2) return true;
        if (z >= 2 && z <= 4) return true;
      }
      return false;
    }

    const WALL_CELLS = (() => {
      const cells = [], seen = new Set();
      for (let x = -NAVE_W - 2; x <= APSE_END + 1; x++) {
        for (let z = -TR_HALF - 1; z <= TR_HALF + 1; z++) {
          if (!inFoot(x, z)) continue;
          if (!inFoot(x + 1, z) || !inFoot(x - 1, z) || !inFoot(x, z + 1) || !inFoot(x, z - 1)) {
            const k = `${x},${z}`;
            if (!seen.has(k)) { seen.add(k); cells.push([x, z]); }
          }
        }
      }
      return cells;
    })();

    const FLOOR_CELLS = (() => {
      const cells = [];
      for (let x = -NAVE_W - 2; x <= APSE_END + 1; x++) {
        for (let z = -TR_HALF - 1; z <= TR_HALF + 1; z++) {
          if (inFoot(x, z)) cells.push([x, z]);
        }
      }
      return cells;
    })();

    const NAVE_SOUTH_WINDOWS = [], NAVE_NORTH_WINDOWS = [];
    for (let x = -NAVE_W + 2; x <= NAVE_E - 2; x += 2) {
      NAVE_SOUTH_WINDOWS.push([x, NAVE_HALF + AISLE]);
      NAVE_NORTH_WINDOWS.push([x, -(NAVE_HALF + AISLE)]);
    }

    // --- ORGANIC BUILDING LOGIC ---
    function buildOrganically(text, paletteName) {
      const palette = PALETTES[paletteName];
      
      const charCount = text.length;
      const wordCount = (text.match(/\b\w+\b/g) || []).length;
      const sentenceCount = (text.match(/[^.!?]+[.!?]+/g) || []).length;
      const paragraphCount = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;

      const MAX_WALL = 14, MAX_WEST = 28, MAX_CROSSING = 22, MAX_APSE = 11;
      
      const wallHeight = Math.min(MAX_WALL, Math.floor(charCount / 60) + (charCount > 0 ? 1 : 0));
      const apseHeight = Math.min(MAX_APSE, Math.round(wallHeight * 0.9));
      const westTowerHeight = Math.min(MAX_WEST, Math.floor(Math.max(0, wordCount - 40) / 10));
      const crossingHeight = Math.min(MAX_CROSSING, Math.floor(Math.max(0, sentenceCount - 10) * 1.5));
      const spiralSteps = sentenceCount;
      const buttressCount = Math.min(5, paragraphCount);
      const windowCount = Math.floor(wordCount / 20);
      const bannerSlot = Math.floor(charCount / 100);
      const lanternSlot = Math.floor(wordCount / 40);

      const voxels = [];
      const occ = new Map();
      function put(x, y, z, color, extra) {
        x = Math.round(x); y = Math.round(y); z = Math.round(z);
        const k = `${x},${y},${z}`;
        if (occ.has(k)) {
          const v = voxels[occ.get(k)];
          v.color = color;
          if (extra) {
            if (extra.emissive != null) v.emissive = extra.emissive;
            if (extra.edge === false) v.edge = false;
          }
          return;
        }
        const v = { x, y, z, color };
        if (extra) {
          if (extra.emissive != null) v.emissive = extra.emissive;
          if (extra.edge === false) v.edge = false;
        }
        voxels.push(v);
        occ.set(k, voxels.length - 1);
      }

      for (const [x, z] of FLOOR_CELLS) put(x, 0, z, palette.floor, { edge: false });
      for (let x = -NAVE_W - 4; x <= APSE_END + 3; x++) {
        for (let z = -TR_HALF - 3; z <= TR_HALF + 3; z++) {
          if (!inFoot(x, z)) {
            let near = false;
            for (let dx = -4; dx <= 4 && !near; dx++) {
              for (let dz = -4; dz <= 4 && !near; dz++) if (inFoot(x + dx, z + dz)) near = true;
            }
            if (near) put(x, -1, z, palette.ground, { edge: false });
          }
        }
      }

      for (const [x, z] of WALL_CELLS) {
        let top = wallHeight;
        if (x > NAVE_E) top = apseHeight;
        const inNWBastion = (x >= -NAVE_W - 1 && x <= -NAVE_W + 1 && z >= -4 && z <= -2);
        const inSWBastion = (x >= -NAVE_W - 1 && x <= -NAVE_W + 1 && z >= 2 && z <= 4);
        if (inNWBastion || inSWBastion) top = Math.max(top, westTowerHeight);
        
        for (let y = 1; y <= top; y++) {
          const c = ((y - 1) % 3 === 0) ? palette.stoneLight : palette.stone;
          put(x, y, z, c);
        }
        if (!inNWBastion && !inSWBastion && x <= NAVE_E && top > 0) {
          if ((Math.abs(x) + Math.abs(z)) % 2 === 0) put(x, top + 1, z, palette.stoneDark);
        }
      }

      if (wallHeight > 0) {
        const roofBase = wallHeight + 1, halfW = NAVE_HALF + AISLE;
        for (let level = 0; level <= halfW; level++) {
          const y = roofBase + level;
          for (let x = -NAVE_W; x <= NAVE_E; x++) {
            if (x >= -TR_W && x <= TR_W) continue;
            put(x, y, -(halfW - level), palette.roof);
            put(x, y, (halfW - level), palette.roof);
            if (level === halfW) put(x, y, 0, palette.roof);
          }
          for (let z = -TR_HALF; z <= TR_HALF; z++) {
            if (z >= -NAVE_HALF && z <= NAVE_HALF) continue;
            put(-(halfW - level), y, z, palette.roof);
            put((halfW - level), y, z, palette.roof);
            if (level === halfW) put(0, y, z, palette.roof);
          }
        }
        for (let x = -NAVE_W; x <= NAVE_E; x++) {
          if (x >= -TR_W && x <= TR_W) continue;
          put(x, roofBase + halfW, 0, palette.roofDark);
        }
      }

      if (apseHeight > 0) {
        const baseY = apseHeight + 1;
        for (let r = 0; r < 3; r++) {
          for (let x = NAVE_E + 1; x <= APSE_END; x++) {
            const dx = x - NAVE_E;
            const maxZ = Math.round(Math.sqrt(Math.max(0, 9 - dx * dx))) - r;
            if (maxZ < 0) continue;
            for (let z = -maxZ; z <= maxZ; z++) put(x, baseY + r, z, palette.roofDark);
          }
        }
      }

      if (westTowerHeight > 0) {
        const ty = westTowerHeight;
        for (const base of [WEST_TOWER_N, WEST_TOWER_S]) {
          for (let dx = -1; dx <= 1; dx++) {
            for (let dz = -1; dz <= 1; dz++) {
              const x = base.x + dx, z = base.z + dz;
              if ((Math.abs(dx) === 1 || Math.abs(dz) === 1) && (dx !== 0 || dz !== 0)) {
                put(x, ty - 2, z, palette.stoneDark);
                put(x, ty - 1, z, palette.stone);
                put(x, ty, z, palette.stoneLight);
              }
            }
          }
          const spireH = 6;
          for (let s = 1; s <= spireH; s++) {
            const r = Math.max(0, 1 - Math.floor((s - 1) / 2));
            for (let dx = -r; dx <= r; dx++) {
              for (let dz = -r; dz <= r; dz++) {
                put(base.x + dx, ty + s, base.z + dz, s < spireH - 1 ? palette.spire : palette.spireCap);
              }
            }
          }
          put(base.x, ty + spireH + 1, base.z, palette.gold, { emissive: 1 });
        }
        if (westTowerHeight >= 6) {
          const cy = Math.max(4, Math.min(wallHeight - 1, 7));
          for (let dz = -2; dz <= 2; dz++) {
            for (let dy = -2; dy <= 2; dy++) {
              if (dz * dz + dy * dy <= 4 && dz * dz + dy * dy >= 2) put(-NAVE_W, cy + dy, dz, palette.stoneDark);
              else if (dz * dz + dy * dy < 2) put(-NAVE_W, cy + dy, dz, palette.glass1, { emissive: 0.9 });
            }
          }
        }
      }

      if (crossingHeight > 0) {
        const topBase = wallHeight;
        const ty = topBase + crossingHeight;
        for (let y = topBase + 1; y <= ty; y++) {
          for (let x = -TR_W; x <= TR_W; x++) {
            for (let z = -NAVE_HALF; z <= NAVE_HALF; z++) {
              if (x === -TR_W || x === TR_W || z === -NAVE_HALF || z === NAVE_HALF) put(x, y, z, palette.stone);
            }
          }
        }
        for (let x = -TR_W; x <= TR_W; x++) {
          for (let z = -NAVE_HALF; z <= NAVE_HALF; z++) {
            if (x === -TR_W || x === TR_W || z === -NAVE_HALF || z === NAVE_HALF) {
              if ((x + z) % 2 === 0) put(x, ty + 1, z, palette.stoneDark);
            }
          }
        }
        if (crossingHeight >= 6) {
          const spireBase = ty + 2;
          const spireH = Math.min(12, Math.floor(crossingHeight / 2) + 4);
          for (let s = 0; s < spireH; s++) {
            const r = Math.max(0, 3 - Math.floor(s * 0.8));
            for (let dx = -r; dx <= r; dx++) {
              for (let dz = -r; dz <= r; dz++) {
                if (Math.abs(dx) === r && Math.abs(dz) === r && r > 0) continue;
                put(dx, spireBase + s, dz, s < spireH - 1 ? palette.spire : palette.spireCap);
              }
            }
          }
          put(0, spireBase + spireH, 0, palette.gold, { emissive: 0.9 });
          put(0, spireBase + spireH + 1, 0, palette.gold, { emissive: 1 });
          put(-1, spireBase + spireH, 0, palette.gold, { emissive: 0.9 });
          put(1, spireBase + spireH, 0, palette.gold, { emissive: 0.9 });
        }
      }

      if (spiralSteps > 0 || westTowerHeight > 0) {
        const tx = NW_TURRET.x - 1, tz = NW_TURRET.z - 1;
        const turretH = Math.max(westTowerHeight - 2, Math.min(20, 2 + Math.floor(spiralSteps / 2)));
        for (let y = 1; y <= turretH; y++) {
          for (let dx = 0; dx < 2; dx++) {
            for (let dz = 0; dz < 2; dz++) put(tx + dx, y, tz + dz, palette.stone);
          }
        }
        for (let s = 0; s < spiralSteps; s++) {
          const y = 1 + Math.floor(s / 2);
          if (y > turretH) break;
          const pos = s % 4;
          let sx = tx, sz = tz;
          if (pos === 0) { sx = tx - 1; } else if (pos === 1) { sz = tz - 1; } else if (pos === 2) { sx = tx + 2; sz = tz + 1; } else { sx = tx + 1; sz = tz + 2; }
          put(sx, y, sz, palette.stoneDark);
        }
        const roofBase = turretH + 1;
        for (let s = 0; s < 4; s++) {
          const r = 1 - Math.floor(s / 2);
          for (let dx = -r; dx <= 1 + r; dx++) {
            for (let dz = -r; dz <= 1 + r; dz++) put(tx + dx, roofBase + s, tz + dz, palette.spire);
          }
        }
        put(tx, roofBase + 4, tz, palette.gold, { emissive: 0.9 });
      }

      for (let i = 0; i < buttressCount; i++) {
        const x = -NAVE_W + 3 + i * 3;
        if (x > NAVE_E - 1) break;
        for (let y = 1; y <= wallHeight - 1; y++) {
          put(x, y, NAVE_HALF + AISLE + 1, palette.stoneDark);
          put(x, y, -(NAVE_HALF + AISLE + 1), palette.stoneDark);
        }
        const archStart = Math.max(3, wallHeight - 2);
        for (let s = 0; s <= 1; s++) {
          put(x, archStart + s, NAVE_HALF + AISLE + 1 - s, palette.stoneDark);
          put(x, archStart + s, -(NAVE_HALF + AISLE + 1 - s), palette.stoneDark);
        }
      }

      for (let i = 0; i < windowCount && i < NAVE_SOUTH_WINDOWS.length * 2; i++) {
        const side = (i % 2 === 0) ? NAVE_SOUTH_WINDOWS : NAVE_NORTH_WINDOWS;
        const idx = Math.floor(i / 2) % side.length;
        const [wx, wz] = side[idx];
        const cy = Math.max(3, Math.min(wallHeight - 1, 5));
        const colors = [palette.glass1, palette.glass2, palette.glass3];
        const col = colors[i % 3];
        for (let dy = -1; dy <= 1; dy++) put(wx, cy + dy, wz, col, { emissive: 0.95 });
        put(wx, cy + 2, wz, palette.stoneDark);
      }

      for (let i = 0; i < bannerSlot && i < 8; i++) {
        const x = -NAVE_W + 2 + i * 2;
        if (x > NAVE_E - 1) break;
        put(x, wallHeight + 2, NAVE_HALF + AISLE, palette.gold, { emissive: 0.6 });
      }
      for (let i = 0; i < lanternSlot && i < 12; i++) {
        const x = -NAVE_W + 2 + i * 2;
        if (x > NAVE_E - 1) break;
        put(x, 1, 0, palette.teal, { emissive: 0.8 });
      }

      return { voxels, stats: { words: wordCount, courses: wallHeight, windows: windowCount } };
    }

    // --- VOXEL RENDERING ENGINE ---
    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const n = parseInt(hex, 16);
      return { r: (n >> 16) & 0xff, g: (n >> 8) & 0xff, b: n & 0xff };
    }

    function rgbToStr(r, g, b, a) {
      return a != null ? `rgba(${r | 0},${g | 0},${b | 0},${a})` : `rgb(${r | 0},${g | 0},${b | 0})`;
    }

    function shade(hex, factor, emissive) {
      const { r, g, b } = hexToRgb(hex);
      let nr = r * factor, ng = g * factor, nb = b * factor;
      if (emissive) {
        nr = Math.min(255, nr + 255 * emissive * 0.35);
        ng = Math.min(255, ng + 255 * emissive * 0.35);
        nb = Math.min(255, nb + 255 * emissive * 0.35);
      }
      return rgbToStr(Math.max(0, Math.min(255, nr)), Math.max(0, Math.min(255, ng)), Math.max(0, Math.min(255, nb)));
    }

    function renderVoxels(ctx, voxels, width, height, zoom, cxOffset, cyOffset, rotation) {
      ctx.clearRect(0, 0, width, height);

      const TILE_W = 18, TILE_H = 9, TILE_V = 18;
      const tw = TILE_W * zoom, th = TILE_H * zoom, tv = TILE_V * zoom;

      const turns = ((rotation % 4) + 4) % 4;
      let cxB = 0, czB = 0;
      const rotatedVoxels = voxels.map(v => {
        let dx = v.x - cxB, dz = v.z - czB;
        for (let i = 0; i < turns; i++) {
          const ndx = -dz, ndz = dx;
          dx = ndx; dz = ndz;
        }
        return { ...v, x: Math.round(cxB + dx), z: Math.round(czB + dz) };
      });

      let minSX = Infinity, maxSX = -Infinity, minSY = Infinity, maxSY = -Infinity;
      for (const v of rotatedVoxels) {
        const px = (v.x - v.z) * (TILE_W / 2);
        const py = (v.x + v.z) * (TILE_H / 2) - v.y * TILE_V;
        if (px < minSX) minSX = px; if (px > maxSX) maxSX = px;
        if (py < minSY) minSY = py; if (py > maxSY) maxSY = py;
      }
      
      const contentW = (maxSX - minSX) || 1;
      const contentH = (maxSY - minSY) || 1;
      const fit = Math.min(width / (contentW + 80), height / (contentH + 100));
      const z = Math.max(0.25, Math.min(2.5, fit * zoom * 0.95));
      
      const cx = width / 2 - ((minSX + maxSX) / 2) * z + cxOffset;
      const cy = height / 2 - ((minSY + maxSY) / 2) * z + cyOffset;

      const rtw = TILE_W * z, rth = TILE_H * z, rtv = TILE_V * z;
      const sorted = rotatedVoxels.sort((a, b) => ((a.x + a.z) * 1000 - a.y) - ((b.x + b.z) * 1000 - b.y));

      for (const v of sorted) {
        const px = cx + (v.x - v.z) * (rtw / 2);
        const py = cy + (v.x + v.z) * (rth / 2) - v.y * rtv;
        const em = v.emissive || 0;

        const top = shade(v.color, 1.15, em);
        const left = shade(v.color, 0.78, em * 0.7);
        const right = shade(v.color, 0.62, em * 0.5);

        ctx.fillStyle = top;
        ctx.beginPath();
        ctx.moveTo(px, py); ctx.lineTo(px + rtw / 2, py + rth / 2); ctx.lineTo(px, py + rth); ctx.lineTo(px - rtw / 2, py + rth / 2);
        ctx.closePath(); ctx.fill();

        ctx.fillStyle = left;
        ctx.beginPath();
        ctx.moveTo(px - rtw / 2, py + rth / 2); ctx.lineTo(px, py + rth); ctx.lineTo(px, py + rth + rtv); ctx.lineTo(px - rtw / 2, py + rth / 2 + rtv);
        ctx.closePath(); ctx.fill();

        ctx.fillStyle = right;
        ctx.beginPath();
        ctx.moveTo(px + rtw / 2, py + rth / 2); ctx.lineTo(px, py + rth); ctx.lineTo(px, py + rth + rtv); ctx.lineTo(px + rtw / 2, py + rth / 2 + rtv);
        ctx.closePath(); ctx.fill();

        if (v.edge !== false) {
          ctx.strokeStyle = 'rgba(0,0,0,0.1)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(px, py + rth); ctx.lineTo(px, py + rth + rtv);
          ctx.moveTo(px - rtw / 2, py + rth / 2); ctx.lineTo(px, py + rth); ctx.lineTo(px + rtw / 2, py + rth / 2);
          ctx.stroke();
        }

        if (em > 0.5) {
          const { r, g, b } = hexToRgb(v.color);
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.fillStyle = rgbToStr(r, g, b, 0.22);
          ctx.beginPath();
          ctx.arc(px, py + rth / 2 + rtv / 2, rtw * 0.9, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }

    // --- MAIN REACT APP ---
    function App() {
      const [text, setText] = useState(
        "Start typing your thoughts here. As your words flow and the paragraphs grow, a cathedral will organically build itself beside you.\n\nThere is no markdown to remember. The structure simply responds to the mass and rhythm of your writing."
      );
      const [palette, setPalette] = useState('dusk');
      const [zoom, setZoom] = useState(1);
      const [rotation, setRotation] = useState(0);
      const [autoRotate, setAutoRotate] = useState(true);
      const [cameraOffset, setCameraOffset] = useState({ x: 0, y: 0 });
      const [showTweaks, setShowTweaks] = useState(false);
      
      // Mobile View Toggle: 'editor' | 'canvas'
      const [mobileView, setMobileView] = useState('editor');

      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      
      const { voxels, stats } = useMemo(() => buildOrganically(text, palette), [text, palette]);

      const handleResize = useCallback(() => {
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;

        const rect = container.getBoundingClientRect();
        // Prevent layout thrashing if the container hasn't been painted/rendered yet
        if (rect.width === 0 || rect.height === 0) return;

        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const targetW = Math.floor(rect.width * dpr);
        const targetH = Math.floor(rect.height * dpr);

        if (canvas.width !== targetW || canvas.height !== targetH) {
          canvas.width = targetW;
          canvas.height = targetH;
        }
        
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        renderVoxels(ctx, voxels, rect.width, rect.height, zoom, cameraOffset.x, cameraOffset.y, rotation);
      }, [voxels, zoom, cameraOffset, rotation]);

      useEffect(() => {
        handleResize();
      }, [handleResize, mobileView]); // Trigger resize when switching views

      useEffect(() => {
        if (!autoRotate) return;
        const intervalId = setInterval(() => {
          setRotation(r => (r + 1) % 4);
        }, 4000);
        return () => clearInterval(intervalId);
      }, [autoRotate]);

      useEffect(() => {
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [handleResize]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        const handleMouseDown = (e) => {
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          isDragging = true;
          lastX = clientX;
          lastY = clientY;
          canvas.style.cursor = 'grabbing';
        };

        const handleMouseUp = () => {
          isDragging = false;
          canvas.style.cursor = 'grab';
        };

        const handleMouseMove = (e) => {
          if (!isDragging) return;
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          
          setCameraOffset(prev => ({
            x: prev.x + (clientX - lastX),
            y: prev.y + (clientY - lastY)
          }));
          lastX = clientX;
          lastY = clientY;
        };

        const handleWheel = (e) => {
          e.preventDefault();
          setZoom(z => Math.max(0.4, Math.min(3, z * (e.deltaY < 0 ? 1.08 : 0.93))));
        };

        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mouseup', handleMouseUp);
        window.addEventListener('mousemove', handleMouseMove);
        
        // Touch support for dragging on mobile canvas
        canvas.addEventListener('touchstart', handleMouseDown, { passive: false });
        window.addEventListener('touchend', handleMouseUp);
        window.addEventListener('touchmove', handleMouseMove, { passive: false });
        
        canvas.addEventListener('wheel', handleWheel, { passive: false });

        return () => {
          canvas.removeEventListener('mousedown', handleMouseDown);
          window.removeEventListener('mouseup', handleMouseUp);
          window.removeEventListener('mousemove', handleMouseMove);
          canvas.removeEventListener('touchstart', handleMouseDown);
          window.removeEventListener('touchend', handleMouseUp);
          window.removeEventListener('touchmove', handleMouseMove);
          canvas.removeEventListener('wheel', handleWheel);
        };
      }, []);

      const bgStyle = {
        background: `linear-gradient(180deg, ${PALETTES[palette].sky1} 0%, ${PALETTES[palette].sky2} 55%, ${PALETTES[palette].sky3} 100%)`
      };

      return (
        <div className="flex flex-col md:flex-row h-[100dvh] w-full bg-slate-50 text-slate-800 font-sans overflow-hidden">
          
          {/* Editor Pane (Full screen on mobile if active, persistent on desktop) */}
          <section className={`absolute inset-0 md:relative md:inset-auto flex-col w-full md:w-[45%] h-[100dvh] border-r border-slate-200 bg-white z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] transition-opacity duration-300 ${mobileView === 'editor' ? 'flex opacity-100' : 'hidden md:flex opacity-0 md:opacity-100'}`}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-white/80 backdrop-blur-md sticky top-0 z-20">
              <div className="flex items-center gap-2">
                <h1 className="font-semibold text-slate-700 tracking-tight text-sm">Organic Canvas</h1>
              </div>
              <div className="text-xs font-medium text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                {stats.words} words
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-6 md:p-10 pb-28 md:pb-10">
              <textarea
                value={text}
                onChange={(e) => setText(e.target.value)}
                spellCheck="false"
                placeholder="Start writing. Watch your thoughts build upwards..."
                className="w-full h-full min-h-[300px] border-none outline-none resize-none bg-transparent text-slate-700 text-lg leading-relaxed placeholder:text-slate-300 font-serif"
              />
            </div>
            
            {/* Mobile Fab: Switch to Canvas */}
            <div className="md:hidden absolute bottom-6 right-6 z-30">
              <button 
                onClick={() => setMobileView('canvas')}
                className="flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-white shadow-xl px-5 py-3 rounded-full font-medium tracking-wide transition-all active:scale-95"
              >
                <Eye size={18} />
                <span>View Build</span>
              </button>
            </div>
          </section>

          {/* Cathedral Canvas Pane (Full screen on mobile if active, persistent on desktop) */}
          <section ref={containerRef} className={`absolute inset-0 md:relative md:inset-auto flex-1 w-full h-[100dvh] bg-slate-900 overflow-hidden z-10 transition-opacity duration-300 ${mobileView === 'canvas' ? 'block opacity-100' : 'hidden md:block opacity-0 md:opacity-100'}`}>
            <div className="absolute inset-0 transition-colors duration-1000 ease-in-out" style={bgStyle}>
              <div className="absolute inset-0 opacity-40 mix-blend-screen pointer-events-none" style={{
                backgroundImage: `radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,0.4), transparent 50%),
                                  radial-gradient(1px 1px at 64% 18%, rgba(255,255,255,0.3), transparent 50%),
                                  radial-gradient(1px 1px at 80% 34%, rgba(255,255,255,0.2), transparent 50%)`
              }}></div>
            </div>
            
            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full cursor-grab active:cursor-grabbing touch-none" />

            <div className="absolute top-6 left-6 flex items-center gap-2 bg-black/20 backdrop-blur-md border border-white/10 text-white/90 px-3 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest pointer-events-none shadow-lg">
              <span className="w-2 h-2 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)] animate-pulse"></span>
              Live Growth
            </div>

            <div className="absolute top-6 right-6 flex gap-4 bg-black/20 backdrop-blur-md border border-white/10 text-white/80 px-4 py-2 rounded-2xl text-xs font-mono uppercase tracking-widest shadow-lg">
              <span>{stats.courses} Lvl</span>
              <span className="opacity-40">•</span>
              <span>{stats.windows} Wndw</span>
            </div>

            {/* Canvas Controls */}
            <div className="absolute bottom-6 right-6 flex flex-col md:flex-row items-end md:items-center gap-2 md:gap-2 z-20">
              <div className="flex gap-2">
                <button onClick={() => setRotation(r => (r + 1) % 4)} className="bg-black/30 hover:bg-black/50 border border-white/10 text-white/90 backdrop-blur-md p-3 rounded-full transition-all shadow-lg active:scale-95">
                  <RotateCcw size={16} />
                </button>
                <button onClick={() => { setCameraOffset({ x: 0, y: 0 }); setZoom(1); }} className="bg-black/30 hover:bg-black/50 border border-white/10 text-white/90 backdrop-blur-md p-3 rounded-full transition-all shadow-lg active:scale-95">
                  <Maximize2 size={16} />
                </button>
                <button onClick={() => setShowTweaks(!showTweaks)} className={`${showTweaks ? 'bg-amber-500 text-slate-900 border-amber-400' : 'bg-black/30 text-white/90 border-white/10'} hover:bg-black/50 backdrop-blur-md p-3 rounded-full transition-all shadow-lg active:scale-95`}>
                  <Settings2 size={16} />
                </button>
              </div>
            </div>

            <div className="hidden md:block absolute bottom-6 left-6 text-white/40 text-[10px] font-mono uppercase tracking-widest pointer-events-none">
              Drag · Scroll · Watch
            </div>

            {/* Mobile Fab: Switch back to Editor */}
            <div className="md:hidden absolute bottom-6 left-6 z-20">
              <button 
                onClick={() => { setMobileView('editor'); setShowTweaks(false); }}
                className="flex items-center gap-2 bg-white text-slate-800 shadow-xl px-5 py-3 rounded-full font-medium tracking-wide transition-all active:scale-95"
              >
                <Pen size={18} />
                <span>Write</span>
              </button>
            </div>

            {/* Tweaks Panel */}
            {showTweaks && (
              <div className="absolute bottom-20 right-4 w-[calc(100vw-2rem)] md:w-64 md:right-6 bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-2xl p-5 shadow-2xl z-30 text-white transition-all">
                <h3 className="text-[10px] uppercase tracking-[0.15em] text-slate-400 font-semibold mb-4 border-b border-white/10 pb-2">Atmosphere</h3>
                
                <div className="grid grid-cols-4 gap-1 mb-6">
                  {Object.entries(PALETTES).map(([key, data]) => {
                    const PaletteIcon = data.icon;
                    return (
                      <button
                        key={key}
                        onClick={() => setPalette(key)}
                        className={`flex flex-col items-center justify-center p-2 rounded-xl transition-all ${palette === key ? 'bg-amber-400 text-slate-900 shadow-sm' : 'hover:bg-white/10 text-slate-400'}`}
                      >
                        <PaletteIcon size={16} className="mb-1" />
                        <span className="text-[9px] uppercase tracking-wider font-medium">{data.name}</span>
                      </button>
                    )
                  })}
                </div>

                <h3 className="text-[10px] uppercase tracking-[0.15em] text-slate-400 font-semibold mb-3 border-b border-white/10 pb-2">Camera</h3>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs text-slate-300">Auto Rotate</span>
                  <button
                    onClick={() => setAutoRotate(!autoRotate)}
                    className={`relative w-10 h-5 rounded-full transition-colors ${autoRotate ? 'bg-amber-400' : 'bg-slate-700'}`}
                  >
                    <div className={`absolute top-1 w-3 h-3 rounded-full bg-white transition-all ${autoRotate ? 'left-6' : 'left-1'}`} />
                  </button>
                </div>
                
                <button 
                  onClick={() => setText("")}
                  className="mt-4 w-full py-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-medium uppercase tracking-wider transition-colors border border-white/5"
                >
                  Clear Canvas
                </button>
              </div>
            )}
          </section>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
